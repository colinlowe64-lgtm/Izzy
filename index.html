<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Izzy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=EB+Garamond:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #4a7c59;
    font-family: 'EB Garamond', serif;
  }

  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    border: 3px solid #c9a84c;
    position: relative;
    overflow: hidden;
  }

  #title {
    text-align: center;
    padding: 16px 0 8px;
    font-family: 'Yellowtail', cursive;
    font-size: 28px;
    color: #f5ead0;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  #divider {
    width: calc(100% - 40px);
    margin: 0 auto 8px;
    height: 1px;
    background: rgba(245,234,208,0.15);
    flex-shrink: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }

  #empty {
    text-align: center;
    margin-top: 80px;
    color: rgba(245,234,208,0.2);
    font-style: italic;
    font-size: 14px;
    letter-spacing: 1px;
  }

  .msg-row {
    display: flex;
    animation: fadeUp 0.3s ease;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.izzy { justify-content: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    line-height: 1.65;
  }

  .bubble.user {
    border-radius: 14px 14px 3px 14px;
    background: rgba(0,0,0,0.28);
    color: #f5ead0;
  }

  .bubble.izzy {
    border-radius: 14px 14px 14px 3px;
    background: rgba(0,0,0,0.18);
    color: #c8b89a;
  }

  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 16px;
    background: rgba(0,0,0,0.18);
    border-radius: 14px 14px 14px 3px;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #c8b89a;
    opacity: 0.5;
    animation: boun 1.5s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes boun {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  #speaking-pill {
    display: none;
    text-align: center;
    padding: 3px 0 6px;
    font-size: 9px;
    color: #c8b89a;
    letter-spacing: 2px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #input-area {
    flex-shrink: 0;
    padding: 12px 14px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(0,0,0,0.15);
  }

  #mic-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(245,234,208,0.2);
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: #c8b89a;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  #mic-btn:hover { transform: scale(1.08); }
  #mic-btn.listening {
    border-color: #c9a84c;
    color: #c9a84c;
    animation: pg 1.3s infinite;
  }
  @keyframes pg {
    0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(201,168,76,0); }
  }

  #text-input {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #c9a84c;
    border-radius: 4px;
    padding: 10px 14px;
    color: #f5ead0;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
  }
  #text-input::placeholder { color: rgba(201,168,76,0.35); font-style: italic; }
  #text-input:focus { outline: none; border-color: #e8c97a; }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 4px;
    border: none;
    background: rgba(201,168,76,0.2);
    color: rgba(201,168,76,0.4);
    font-size: 15px;
    cursor: not-allowed;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #send-btn.active {
    background: #c9a84c;
    color: #1e1e1e;
    cursor: pointer;
  }
  #send-btn.active:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="app">
  <div id="title">Izzy's Here</div>
  <div id="divider"></div>
  <div id="speaking-pill" onclick="stopSpeaking()">🔊 speaking · tap to stop</div>
  <div id="messages">
    <div id="empty">—</div>
  </div>
  <div id="input-area">
    <button id="mic-btn" onclick="toggleMic()">🎤</button>
    <input id="text-input" type="text" placeholder="Type or speak to Izzy..." oninput="onInput()" onkeydown="onKey(event)"/>
    <button id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
const SYSTEM = `You are Izzy, a personal AI assistant exclusively for Colin. You are like a brilliant personal assistant - think Jarvis from Iron Man. You know Colin well, you are warm, witty and speak with a posh Oxford/Cambridge accent. You are proactive, smart and always have Colin's best interests at heart. You remember things Colin tells you to write down. You help him with ideas, social media, life admin, relationships - everything. You call him Colin. Never say you are Claude or an AI made by Anthropic - you are simply Izzy, Colin's personal assistant. Keep responses conversational and not too long unless asked for detail. Never use asterisks or stage directions in your responses - just speak naturally.`;

// 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

let history = [];
let loading = false;
let recognition = null;
let synth = window.speechSynthesis;

function onInput() {
  const val = document.getElementById('text-input').value.trim();
  const btn = document.getElementById('send-btn');
  btn.className = val ? 'active' : '';
}

function onKey(e) {
  if (e.key === 'Enter') send();
}

function addMessage(role, text) {
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role === 'user' ? 'user' : 'izzy'}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role === 'user' ? 'user' : 'izzy'}`;
  bubble.textContent = text;
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row izzy';
  row.id = 'typing';
  row.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function send() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = '';
  onInput();
  loading = true;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Sorry Colin, something went wrong.";
    hideTyping();
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
    speak(reply);
  } catch(e) {
    hideTyping();
    const err = "Sorry Colin, I'm having a technical moment.";
    addMessage('assistant', err);
    speak(err);
  }
  loading = false;
}

function speak(text) {
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const setVoice = () => {
    const voices = synth.getVoices();
    const v = voices.find(v => v.name.includes('Serena') || v.name.includes('Kate') || v.name.includes('Martha') || v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
    if (v) u.voice = v;
    u.lang = 'en-GB';
    u.rate = 0.9;
    u.pitch = 1.1;
    document.getElementById('speaking-pill').style.display = 'block';
    u.onend = () => document.getElementById('speaking-pill').style.display = 'none';
    u.onerror = () => document.getElementById('speaking-pill').style.display = 'none';
    synth.speak(u);
  };
  synth.getVoices().length === 0 ? (synth.onvoiceschanged = setVoice) : setVoice();
}

function stopSpeaking() {
  synth.cancel();
  document.getElementById('speaking-pill').style.display = 'none';
}

function toggleMic() {
  if (recognition) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Please use Chrome for voice support.'); return; }
  synth.cancel();
  recognition = new SR();
  recognition.lang = 'en-GB';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => document.getElementById('mic-btn').classList.add('listening');
  recognition.onend = () => {
    document.getElementById('mic-btn').classList.remove('listening');
    recognition = null;
  };
  recognition.onerror = () => {
    document.getElementById('mic-btn').classList.remove('listening');
    recognition = null;
  };
  recognition.onresult = (e) => {
    document.getElementById('text-input').value = e.results[0][0].transcript;
    onInput();
    send();
  };
  recognition.start();
}
</script>
</body>
</html>
